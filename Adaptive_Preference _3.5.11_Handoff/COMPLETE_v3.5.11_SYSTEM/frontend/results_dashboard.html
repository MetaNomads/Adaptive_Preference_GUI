<!DOCTYPE html>

  <style>

    .top-nav {
        display:flex;
        align-items:center;

        border-bottom:1px solid #2a3359;
    }

        font-weight:700;

    }
    .nav-links a {

    body {

      margin:0;
      background:#0b1020;
      color:#e8ecff;
    }
    .container {
      max-width: 1200px;

      padding: 32px 20px 40px;
    }
    h1 { margin: 0 0 6px 0; font-size: 28px; }
    #expStatus { margin: 0 0 20px 0; color:#9aa3c7;}
    .card {
      background: #121a35;
      border:1px solid #2a3359;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);

    .grid {
      display:grid;

    .metric {
      background:#161d3f;

      color:#9aa3c7;

    }

    .btn {
      background: #667eea;
      color: white;
      padding: 10px 18px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      border: 1px solid #5364d4;
      cursor:pointer;
      display:inline-block;
      transition: all 0.2s;
    }
    .btn:hover {
      background:#5568d3;
      transform: translateY(-2px); 
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4); 
    }

    .btn-secondary {
      background: transparent;
      border-color:#2a3359;
      color:#e8ecff;
    }
    .btn-secondary:hover {
      background:#161d3f;
    }
    .btn-sm { padding:6px 10px; font-size:12px; border-radius: 8px; }

    /* New Session Button Style (Green) */
    .btn-new-session {
      background-color: #48bb78;
      border-color: #38a169;
      margin-right: 8px;
    }
    .btn-new-session:hover {
      background-color: #38a169;
      box-shadow: 0 4px 12px rgba(72, 187, 120, 0.4);
    }

    .filters {
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:flex-end;
      margin-bottom: 10px;
      margin-top: 10px;
    }
    .filters label {
      font-size:13px;
      color:#cdd5ff;
      display:flex;
      flex-direction:column;
      gap:4px;
    }
    .filters input[type="date"],
    .filters select {
      background:#090d1a;
      color:#e8ecff;
      border-radius:8px;
      border:1px solid #2a3359;
      padding:6px 8px;
      font-size:13px;
    }
    .filters input[type="checkbox"] {
      margin-right:6px;
    }

    table {
      width:100%;
      border-collapse: collapse;
      margin-top: 8px;
      font-size: 13px;
    }
    th, td {
      text-align:left;
      padding: 8px 8px;
      border-bottom: 1px solid #2a3359;
    }
    th {
      text-transform: uppercase;
      letter-spacing:.06em;
      font-size:11px;
      color:#9aa3c7;
    }
    tbody tr:hover {
      background:#161d3f;
    }
    .pill {
      padding:4px 8px;
      border-radius:999px;
      font-size:11px;
      font-weight:600;
      display:inline-block;
    }
    .pill-ok {
      background:rgba(72,187,120,0.12);
      color:#9ae6b4;
      border:1px solid rgba(72,187,120,0.5);
    }
    .pill-fail {
      background:rgba(252,129,129,0.12);
      color:#fed7d7;
      border:1px solid rgba(252,129,129,0.5);
    }

    .pill-progress {
      background: rgba(102, 126, 234, 0.12);
      color: #667eea;
      border: 1px solid rgba(102, 126, 234, 0.5);
    }
    .pill-neutral {
      background: rgba(154, 163, 199, 0.12);
      color: #9aa3c7;
      border: 1px solid #4b546f;
    }

    .muted { color:#9aa3c7; font-size:13px; }

    .section-title {
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:4px;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
    }
    @media (max-width: 640px) {
      .grid { grid-template-columns: repeat(1, minmax(0,1fr)); }
      table { font-size:12px; }
      th, td { padding:6px 4px; }
    }
  </style>
</head>

  <script>
    const API_BASE = 'http://127.0.0.1:5000/api';

    function authHeader() {
      const t = localStorage.getItem('jwt') || localStorage.getItem('token');
      return t ? { 'Authorization': 'Bearer ' + t } : {};
    }
    
    // Redirect to dev login if needed
    async function devLogin() {
       window.location.href = 'admin_PATCHED.html'; // Or handle dev login here
    }

    const state = {
      rawData: null,
      filteredSessions: []
    };

    function formatDateTime(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return '—';
      return d.toLocaleString();
    }

    function shortSessionId(session) {
      if (session.simple_session_id) return session.simple_session_id;
      if (session.session_id && session.session_id.length > 8) {
        return 'S…' + session.session_id.slice(-8);
      }
      return session.session_id || '—';
    }

    function shortParticipantId(session) {
      if (session.participant_id) return session.participant_id;
      if (session.subject_id) return session.subject_id;
      return '—';
    }

    function openAddSubjectModal() {
        document.getElementById('newSubjectName').value = '';
        document.getElementById('newSubjectId').value = '';
        document.getElementById('addSubjectDialog').showModal();
    }

    async function saveNewSubject() {
          const name = document.getElementById('newSubjectName').value;
          const pid = document.getElementById('newSubjectId').value;
          
          // 1. Basic Validation
          if(!name || !pid) return alert('Name and ID required');
          
          // 2. Check for Duplicates
          // We look through the existing sessions loaded in memory
          const sessions = state.rawData.sessions || [];
          const duplicate = sessions.find(s => s.subject_id === pid);
          
          if (duplicate) {
              alert(`Error: Participant ID "${pid}" is already taken by ${duplicate.subject_name || 'another subject'}.\n\nPlease choose a different ID.`);
              return; // Stop here, do not send to server
          }

          // 3. Proceed if unique
          try {
              const expId = state.rawData.experiment.experiment_id;
              await fetch(`${API_BASE}/sessions`, {
                  method:'POST',
                  headers:{'Content-Type':'application/json', ...authHeader()},
                  body:JSON.stringify({ experiment_id:expId, subject_id:pid, subject_metadata:{subject_name:name} })
              });
              document.getElementById('addSubjectDialog').close();
              loadResults();
          } catch(e) { alert(e.message); }
      }

    function renderMetrics(summary) {
      document.getElementById('m_total_sessions').innerText = summary.total_sessions ?? '-';
      document.getElementById('m_completed').innerText     = summary.completed_sessions ?? '-';
      document.getElementById('m_active').innerText        = summary.active_sessions ?? '-';
      document.getElementById('m_choices').innerText       = summary.total_choices ?? '-';
    }

    function applyFilters() {
      if (!state.rawData) return;
      const sessions = state.rawData.sessions || [];
      const fromVal = document.getElementById('fromDate').value;
      const toVal   = document.getElementById('toDate').value;

      let filtered = sessions.slice();

      if (fromVal) {
        const fromDate = new Date(fromVal);
        filtered = filtered.filter(s => {
          const t = new Date(s.completed_at || s.created_at);
          return !Number.isNaN(t.getTime()) && t >= fromDate;
        });
      }

      if (toVal) {
        const toDate = new Date(toVal);
        filtered = filtered.filter(s => {
          const t = new Date(s.completed_at || s.created_at);
          return !Number.isNaN(t.getTime()) && t <= toDate;
        });
      }

      state.filteredSessions = filtered;
      renderSessionsTable();
    }

function renderSessionsTable() {
      const body = document.getElementById('sessionsBody');
      const sessions = state.filteredSessions;

      if (!sessions || sessions.length === 0) {
        body.innerHTML = '<tr><td colspan="7" class="muted" style="padding:12px;">No sessions match the current filters.</td></tr>';
        return;
      }

      body.innerHTML = '';
      sessions.forEach(s => {
        const tr = document.createElement('tr');

        // 1. Subject Name (Clickable Link)
        const tdName = document.createElement('td');
        if (s.subject_name) {
            const link = document.createElement('a');
            link.textContent = s.subject_name;
            link.style.color = '#667eea'; // Accent color
            link.style.fontWeight = '600';
            link.style.cursor = 'pointer';
            link.style.textDecoration = 'none';

            const params = new URLSearchParams(window.location.search);
            const expId = params.get('exp'); 
            
            const url = `subject_interface_complete.html?exp=${encodeURIComponent(expId)}&sub=${encodeURIComponent(s.subject_id || '')}&name=${encodeURIComponent(s.subject_name)}&token=${s.session_token}`;
            link.href = url;
            link.target = '_blank';

            link.onmouseover = () => link.style.textDecoration = 'underline';
            link.onmouseout = () => link.style.textDecoration = 'none';
            
            tdName.appendChild(link);
        } else {
            tdName.textContent = '—';
        }
        
        // 2. Session ID
        const tdSession = document.createElement('td');
        tdSession.textContent = shortSessionId(s);

        // 3. Participant ID
        const tdParticipant = document.createElement('td');
        tdParticipant.textContent = shortParticipantId(s);

        // 4. Status
        const tdStatus = document.createElement('td');
        let statusHtml = '';
        const trialsComp = s.trials_completed || 0;
        
        if (s.status === 'complete') {
            statusHtml = '<span class="pill pill-ok">Finished</span>';
        } else if (trialsComp > 0) {
            statusHtml = '<span class="pill pill-progress">In Progress</span>';
        } else {
            statusHtml = '<span class="pill pill-neutral">Not Started</span>';
        }
        tdStatus.innerHTML = statusHtml;

        // 5. Started
        const tdStarted = document.createElement('td');
        tdStarted.textContent = formatDateTime(s.created_at);

        // 6. Completed
        const tdCompleted = document.createElement('td');
        tdCompleted.textContent = formatDateTime(s.completed_at);

        // 7. Export
        const tdExport = document.createElement('td');
        const pid = (s.subject_id || s.participant_id || '').toString().trim();
        if (!pid) {
          tdExport.innerHTML = '<span class="muted">—</span>';
        } else {
         // const rawBtn = document.createElement('button');
         // rawBtn.className = 'btn btn-secondary btn-sm';
          //rawBtn.textContent = 'Raw';
         // rawBtn.onclick = () => exportParticipantCsv(pid, 'raw');

          const cleanBtn = document.createElement('button');
          cleanBtn.className = 'btn btn-secondary btn-sm';
          cleanBtn.style.marginLeft = '6px';
          cleanBtn.textContent = 'Clean';
          cleanBtn.onclick = () => exportParticipantCsv(pid, 'clean');

         // tdExport.appendChild(rawBtn);
          tdExport.appendChild(cleanBtn);
        }

        tr.appendChild(tdName);
        tr.appendChild(tdSession);
        tr.appendChild(tdParticipant);
        tr.appendChild(tdStatus);
        tr.appendChild(tdStarted);
        tr.appendChild(tdCompleted);
        tr.appendChild(tdExport);

        body.appendChild(tr);
      });
    }
        function renderStimuliSummary(stimuliStats) {
      const card = document.getElementById('stimuliCard');
      const body = document.getElementById('stimuliBody');
      if (!stimuliStats || !stimuliStats.length) {
        card.style.display = 'none';
        return;
      }
      card.style.display = 'block';
      body.innerHTML = '';
      stimuliStats.forEach(st => {
        const shown = st.times_shown ?? st.n_shown ?? 0;
        const chosen = st.times_chosen ?? st.n_chosen ?? 0;
        const win = shown > 0 ? ((chosen / shown) * 100).toFixed(1) + '%' : '—';
        const label = st.label || st.stimulus_name || st.stimulus_id || 'Stimulus';
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${label}</td>
          <td>${shown}</td>
          <td>${chosen}</td>
          <td>${win}</td>
        `;
        body.appendChild(tr);
      });
    }

    function getFilenameFromContentDisposition(headerValue) {
      if (!headerValue) return null;
      const parts = headerValue.split(';').map(p => p.trim());
      const filenamePart = parts.find(p => p.toLowerCase().startsWith('filename='));
      if (!filenamePart) return null;
      let filename = filenamePart.substring('filename='.length).trim();
      if (filename.startsWith('"') && filename.endsWith('"')) {
        filename = filename.slice(1, -1);
      }
      return filename || null;
    }

    async function exportParticipantCsv(participantId, kind) {
      const params = new URLSearchParams(window.location.search);
      const experimentId = params.get('exp');
      if (!experimentId) { alert('No experiment ID provided'); return; }
      if (!participantId) { alert('Missing participant id'); return; }

      try {
        const endpoint = kind === 'raw'
          ? `${API_BASE}/experiments/${experimentId}/participants/${encodeURIComponent(participantId)}/export_choices_csv`
          : `${API_BASE}/experiments/${experimentId}/participants/${encodeURIComponent(participantId)}/export_clean_choices_csv`;

        const resp = await fetch(endpoint, { headers: { ...authHeader() } });
        if (!resp.ok) throw new Error(`Export failed (${resp.status})`);

        const cdHeader = resp.headers.get('Content-Disposition');
        let filename = getFilenameFromContentDisposition(cdHeader) || `participant_${participantId}_${kind}.csv`;

        const blob = await resp.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(url);
      } catch (err) {
        console.error(err);
        alert(err.message || 'Export failed');
      }
    }

    async function exportCsv(kind) {
      const params = new URLSearchParams(window.location.search);
      const experimentId = params.get('exp');
      if (!experimentId) { alert('No experiment ID provided'); return; }

      const rawBtn   = document.getElementById('downloadRawBtn');
      const cleanBtn = document.getElementById('downloadCleanBtn');
      const btn = kind === 'raw' ? rawBtn : cleanBtn;

      if (!btn) return;

      btn.disabled = true;
      const original = btn.textContent;
      btn.textContent = 'Exporting...';

      try {
        const endpoint = kind === 'raw'
          ? `${API_BASE}/experiments/${experimentId}/export_choices_csv`
          : `${API_BASE}/experiments/${experimentId}/export_clean_choices_csv`;

        const resp = await fetch(endpoint, { headers: { ...authHeader() } });
        if (!resp.ok) throw new Error(`Export failed (${resp.status})`);

        const cdHeader = resp.headers.get('Content-Disposition');
        let filename = getFilenameFromContentDisposition(cdHeader);
        if (!filename) {
          filename = `experiment_${experimentId}_${kind}_${Date.now()}.csv`;
        }

        const blob = await resp.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        window.URL.revokeObjectURL(url);

      } catch (err) {
        console.error(err);
        alert('Export failed: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = original;
      }
    }

    // --- NEW LOGIC FOR GENERATING PARTICIPANT IDs AND STARTING SESSIONS ---

    function buildParticipantId(expName, expId, currentCount) {
      const baseRaw = (expName || 'EXP').toUpperCase();
      const baseCode = (baseRaw.replace(/[^A-Z0-9]/g, '').slice(0, 4)) || 'EXP';
      const expShort = (expId || '').replace(/[^A-Z0-9]/gi, '').slice(0, 4);
      const nextIndex = (currentCount || 0) + 1;
      return `${baseCode}-${expShort || 'E'}-P${String(nextIndex).padStart(3, '0')}`;
    }

    function startNewSession() {
            // Safety check: ensure data is loaded
            if (!state.rawData || !state.rawData.experiment) {
                alert("Experiment data is still loading. Please wait a moment.");
                return;
            }

            const exp = state.rawData.experiment;
            // Calculate next participant ID based on total sessions count
            const count = state.rawData.summary ? (state.rawData.summary.total_sessions || 0) : 0;
            
            // Helper to generate ID (e.g., EXP-E123-P005)
            const baseRaw = (exp.name || 'EXP').toUpperCase();
            const baseCode = (baseRaw.replace(/[^A-Z0-9]/g, '').slice(0, 4)) || 'EXP';
            const expShort = (exp.experiment_id || '').replace(/[^A-Z0-9]/gi, '').slice(0, 4);
            const nextIndex = count + 1;
            const pid = `${baseCode}-${expShort || 'E'}-P${String(nextIndex).padStart(3, '0')}`;
            
            // Open the subject interface with force_new=true to clear any cached sessions
            const url = `subject_interface_complete.html?exp=${encodeURIComponent(exp.experiment_id)}&sub=${encodeURIComponent(pid)}&force_new=true`;
            window.open(url, '_blank');
        }

  async function loadResults() {
      try {
        const params = new URLSearchParams(window.location.search);
        const experimentId = params.get('exp');
        if (!experimentId) {
          document.getElementById('expName').innerText = 'No experiment specified';
          document.getElementById('expStatus').innerText = 'Append ?exp=<experiment_id> to the URL.';
          return;
        }

        const rawBtn = document.getElementById('downloadRawBtn');
        const cleanBtn = document.getElementById('downloadCleanBtn');
        const newSessionBtn = document.getElementById('btnStartNew'); // Updated ID
        
        if (rawBtn) {
            rawBtn.style.display = 'inline-block';
            rawBtn.onclick = () => exportCsv('raw');
        }
        if (cleanBtn) {
            cleanBtn.style.display = 'inline-block';
            cleanBtn.onclick = () => exportCsv('clean');
        }
        if (newSessionBtn) {
            newSessionBtn.style.display = 'inline-block';
            // onclick is already handled in the HTML
        }

        const res = await fetch(`${API_BASE}/experiments/${experimentId}/results`, {
          headers: { 'Accept': 'application/json', ...authHeader() }
        });
        if (!res.ok) throw new Error('Failed to fetch results');
        const data = await res.json();
        state.rawData = data;
        state.filteredSessions = (data.sessions || []).slice();

        document.getElementById('expName').innerText =
          data.experiment?.name || 'Results';
        document.getElementById('expStatus').innerText =
          `Status: ${data.experiment?.status || 'unknown'}`;

        renderMetrics(data.summary || {});
        renderSessionsTable();
        renderStimuliSummary(data.stimuli_stats || data.stimuli || []);
      } catch (e) {
        console.error(e);
        document.getElementById('expStatus').innerText = e.message;
        const body = document.getElementById('sessionsBody');
        if (body) body.innerHTML = `<tr><td colspan="7" class="muted" style="padding:12px;">${e.message}</td></tr>`;
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById('applyFiltersBtn').addEventListener('click', applyFilters);
      loadResults();
    });
  </script>
</body>
</html>
