services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: adaptive_testing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - adpref_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d adaptive_testing"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  adpref_pgdata:

